name: Linux GUI Package

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux-gui:
    name: Linux GUI / x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++ \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            ninja-build \
            patchelf \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-multimedia-dev \
            qt6-qpa-plugins

      - name: Build board
        run: |
          cmake -S gui-qt -B gui-qt/build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build gui-qt/build-linux --parallel 2

      - name: Package board
        run: tools/package-linux-gui.sh

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: bitfox-linux-x86_64-gui
          path: |
            dist/bitfox-*-linux-x86_64-gui.tar.gz
            dist/bitfox-*-linux-x86_64-gui.tar.gz.sha256
